site_name: Cybersecurity Interview Questions
site_url: https://excalibra.github.io/cybersecurity-interview-questions/
repo_name: Excalibra/cybersecurity-interview-questions
repo_url: https://github.com/Excalibra/cybersecurity-interview-questions

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
  language: en

nav:
  - Home: index.md
  - Interview Questions: questions/index.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed
  - toc:
      permalink: true
