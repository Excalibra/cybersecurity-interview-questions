{% extends "base.html" %}

{% block content %}
{{ super() }}

<style>
.md-sidebar--primary, .md-nav--primary, .md-sidebar__scrollwrap { display: none !important; }
.md-main__inner { margin-left: 0 !important; }
</style>

<!-- Load auto-generated categories -->
<script src="/cybersecurity-interview-questions/questions/categories.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
	const selector = document.getElementById('category-selector');
	const questionsList = document.getElementById('questions-list');
	const mainContent = document.getElementById('main-content');
	
	function loadCategory(val) {
		if (!val || typeof categories === 'undefined') {
			questionsList.innerHTML = '<p style="color:#9ca3af;">No category selected.</p>';
			return;
		}
		
		const cat = categories[val];
		if (!cat) return;
		
		let html = '';
		cat.items.forEach(item => {
			html += `<div style="margin:8px 0; padding:6px 10px; border-radius:4px;">
			<a href="#" class="question-link" data-url="${item.link}" style="color:#60a5fa; text-decoration:none; display:block;">${item.text}</a>
			</div>`;
		});
		
		questionsList.innerHTML = html || '<p style="color:#9ca3af;">No items yet.</p>';
		mainContent.innerHTML = `<h2>${cat.title}</h2><p>Select an item from the left.</p>`;
	}
	
	selector.addEventListener('change', (e) => loadCategory(e.target.value));
	
	questionsList.addEventListener('click', async function(e) {
		if (e.target.classList.contains('question-link')) {
			e.preventDefault();
			const url = e.target.getAttribute('data-url');
			try {
				mainContent.innerHTML = `<h2>Loading...</h2>`;
				const res = await fetch(url);
				const html = await res.text();
				const doc = new DOMParser().parseFromString(html, 'text/html');
				const content = doc.querySelector('.md-content__inner') || doc.body;
				mainContent.innerHTML = `<h2>${e.target.textContent}</h2>` + content.innerHTML;
			} catch (err) {
				mainContent.innerHTML = `<h2>Error</h2><p>Failed to load content.</p>`;
			}
		}
	});
});
</script>
<!-- ==================== TOPICS SUPPORT ==================== -->
<script src="/cybersecurity-interview-questions/topics/categories.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const topicSelector = document.getElementById('topic-selector');
    const topicsList = document.getElementById('topics-list');
    const mainContent = document.getElementById('main-content');

    if (topicSelector && topicsList) {
        topicSelector.addEventListener('change', function() {
            const val = this.value;
            if (!val || typeof topicCategories === 'undefined') {
                topicsList.innerHTML = '<p style="color:#9ca3af;">No topic selected.</p>';
                return;
            }
            
            const cat = topicCategories[val];
            let html = '';
            
            cat.items.forEach(item => {
                html += `<div style="margin:8px 0; padding:6px 10px; border-radius:4px;">
                <a href="#" class="topic-link" data-url="${item.link}" style="color:#60a5fa; text-decoration:none; display:block;">${item.text}</a>
                </div>`;
            });
            
            topicsList.innerHTML = html || '<p style="color:#9ca3af;">No FAQs yet.</p>';
            mainContent.innerHTML = `<h2>${cat.title}</h2><p>Select an FAQ from the left sidebar.</p>`;
        });

        // Click handler for loading FAQ content
        topicsList.addEventListener('click', async function(e) {
            if (e.target.classList.contains('topic-link')) {
                e.preventDefault();
                const url = e.target.getAttribute('data-url');
                try {
                    mainContent.innerHTML = `<h2>Loading...</h2>`;
                    const res = await fetch(url);
                    const html = await res.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    const content = doc.querySelector('.md-content__inner') || doc.body;
                    mainContent.innerHTML = `<h2>${e.target.textContent}</h2>` + content.innerHTML;
                } catch (err) {
                    mainContent.innerHTML = `<h2>Error loading content</h2>`;
                }
            }
        });
    }
});
</script>
{% endblock %}
{% endblock %}
