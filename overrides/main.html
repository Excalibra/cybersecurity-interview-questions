{% extends "base.html" %}

{% block content %}
{{ super() }}

<style>
  /* Completely hide default MkDocs left sidebar and navigation */
  .md-sidebar--primary,
  .md-nav--primary,
  .md-sidebar__scrollwrap,
  .md-nav__list,
  .md-nav__title {
    display: none !important;
  }
  
  /* Adjust main content to take more space */
  .md-main__inner {
    margin-left: 0 !important;
    max-width: 100% !important;
  }
  
  .md-content {
    margin-left: 0 !important;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const selector = document.getElementById('category-selector');
  const questionsList = document.getElementById('questions-list');
  const mainContent = document.getElementById('main-content');

  const categories = {
    "web": {
      title: "Web Application Penetration Testing",
      items: [
        {text: "21. HTTP Connection vs Persistent Connection", link: "/cybersecurity-interview-questions/questions/web-penetration/21-http-short-long/"},
        {text: "22. How TCP Ensures Reliable Transmission", link: "/cybersecurity-interview-questions/questions/web-penetration/22-tcp-reliable/"}
      ]
    },
    "red": { title: "Red Team Operations", items: [] },
    "seceng": { title: "Security Engineer", items: [] }
  };

  selector.addEventListener('change', function() {
    const val = this.value;
    if (!val) {
      questionsList.innerHTML = '<p style="color:#9ca3af;">No category selected.</p>';
      mainContent.innerHTML = '<p>Select a category above to load questions on the left.</p>';
      return;
    }

    const cat = categories[val];
    let html = '';

    cat.items.forEach(item => {
      html += `<div style="margin:8px 0; padding:6px 10px; border-radius:4px;">
        <a href="${item.link}" style="color:#60a5fa; text-decoration:none; display:block;">${item.text}</a>
      </div>`;
    });

    if (cat.items.length === 0) {
      html = '<p style="color:#9ca3af;">No questions added yet for this category.</p>';
    }

    questionsList.innerHTML = html;
    mainContent.innerHTML = `<h2>${cat.title} Interview Questions</h2>`;
  });
});
</script>
{% endblock %}
