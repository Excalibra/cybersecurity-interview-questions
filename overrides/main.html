<!-- Topics Support -->
<script src="/cybersecurity-interview-questions/topics/categories.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Topics handler
    const topicSelector = document.getElementById('topic-selector');
    const topicsList = document.getElementById('topics-list');
    const mainContent = document.getElementById('main-content');

    if (topicSelector && topicsList) {
        topicSelector.addEventListener('change', function() {
            const val = this.value;
            if (!val || typeof topicCategories === 'undefined') return;
            
            const cat = topicCategories[val];
            let html = '';
            cat.items.forEach(item => {
                html += `<div style="margin:8px 0; padding:6px 10px; border-radius:4px;">
                <a href="#" class="topic-link" data-url="${item.link}" style="color:#60a5fa; text-decoration:none; display:block;">${item.text}</a>
                </div>`;
            });
            topicsList.innerHTML = html || '<p style="color:#9ca3af;">No FAQs yet.</p>';
            mainContent.innerHTML = `<h2>${cat.title}</h2><p>Select an FAQ from the left.</p>`;
        });

        topicsList.addEventListener('click', async function(e) {
            if (e.target.classList.contains('topic-link')) {
                e.preventDefault();
                const url = e.target.getAttribute('data-url');
                try {
                    mainContent.innerHTML = `<h2>Loading...</h2>`;
                    const res = await fetch(url);
                    const html = await res.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    const content = doc.querySelector('.md-content__inner') || doc.body;
                    mainContent.innerHTML = `<h2>${e.target.textContent}</h2>` + content.innerHTML;
                } catch (err) {
                    mainContent.innerHTML = `<h2>Error loading content</h2>`;
                }
            }
        });
    }
});
</script>
{% endblock %}
