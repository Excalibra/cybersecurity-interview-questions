{% extends "base.html" %}

{% block content %}
{{ super() }}

<style>
  .md-sidebar--primary, .md-nav--primary, .md-sidebar__scrollwrap { display: none !important; }
  .md-main__inner { margin-left: 0 !important; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const selector = document.getElementById('category-selector');
  const questionsList = document.getElementById('questions-list');
  const mainContent = document.getElementById('main-content');

  const categories = {
    "web": {
      title: "Web Application Penetration Testing",
      items: [
        {text: "21. HTTP Connection vs Persistent Connection", link: "/cybersecurity-interview-questions/questions/web-penetration/21-http-short-long/"},
        {text: "22. How TCP Ensures Reliable Transmission", link: "/cybersecurity-interview-questions/questions/web-penetration/22-tcp-reliable/"}
      ]
    },
    "red": { title: "Red Team Operations", items: [] },
    "seceng": { title: "Security Engineer", items: [] }
  };

  function loadCategory(val) {
    if (!val) {
      questionsList.innerHTML = '<p style="color:#9ca3af;">No category selected.</p>';
      return;
    }

    const cat = categories[val];
    let html = '';

    cat.items.forEach(item => {
      html += `<div style="margin:8px 0; padding:6px 10px; border-radius:4px;">
        <a href="#" class="question-link" data-url="${item.link}" style="color:#60a5fa; text-decoration:none; display:block;">${item.text}</a>
      </div>`;
    });

    if (cat.items.length === 0) {
      html = '<p style="color:#9ca3af;">No questions added yet.</p>';
    }

    questionsList.innerHTML = html;
    mainContent.innerHTML = `<h2>${cat.title} Interview Questions</h2><p>Select a question from the left.</p>`;
  }

  // Handle category change
  selector.addEventListener('change', function() {
    loadCategory(this.value);
  });

  // Handle clicking a question → load content dynamically
  questionsList.addEventListener('click', async function(e) {
    if (e.target.classList.contains('question-link')) {
      e.preventDefault();
      const url = e.target.getAttribute('data-url');

      try {
        mainContent.innerHTML = `<h2>Loading...</h2>`;
        
        const response = await fetch(url);
        const html = await response.text();
        
        // Extract main content from the loaded page
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const article = doc.querySelector('.md-content__inner') || doc.querySelector('article') || doc.body;
        
        mainContent.innerHTML = `<h2>${e.target.textContent}</h2>` + article.innerHTML;
      } catch (err) {
        mainContent.innerHTML = `<h2>Error</h2><p>Failed to load question content.</p>`;
      }
    }
  });
});
</script>
{% endblock %}
