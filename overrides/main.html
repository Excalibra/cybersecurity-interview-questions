{% extends "base.html" %}

{% block content %}
{{ super() }}

<script>
document.addEventListener('DOMContentLoaded', function() {
  const selector = document.getElementById('category-selector');
  
  selector.addEventListener('change', function() {
    const val = this.value;
    if (!val) return;
    
    let url = '';
    if (val === 'web') {
      url = '/cybersecurity-interview-questions/questions/web-penetration/index/';
    } else if (val === 'red') {
      url = '/cybersecurity-interview-questions/questions/red-team/index/';
    } else if (val === 'seceng') {
      url = '/cybersecurity-interview-questions/questions/security-engineer/index/';
    }
    
    if (url) {
      window.location.href = url;
    }
  });
});
</script>
{% endblock %}
