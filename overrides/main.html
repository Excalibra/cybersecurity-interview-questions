{% extends "base.html" %}

{% block content %}
{{ super() }}

<script>
document.addEventListener('DOMContentLoaded', function() {
  const selector = document.getElementById('category-selector');
  const container = document.getElementById('dynamic-content');

  const categories = {
    'web': {
      title: 'Web Application Penetration Testing Interview Questions',
      questions: [
        {title: '21. HTTP Connection vs Persistent Connection', url: '/questions/web-penetration/21-http-short-long/'},
        {title: '22. How TCP Ensures Reliable Transmission', url: '/questions/web-penetration/22-tcp-reliable/'}
      ]
    },
    'red': {
      title: 'Red Team Operations Interview Questions',
      questions: [] // add later
    },
    'seceng': {
      title: 'Security Engineer Interview Questions',
      questions: [] // add later
    }
  };

  selector.addEventListener('change', function() {
    const val = this.value;
    if (!val) {
      container.innerHTML = '<p><em>Select a category above.</em></p>';
      return;
    }

    const cat = categories[val];
    let html = `<h2>${cat.title}</h2><ul>`;

    cat.questions.forEach(q => {
      html += `<li><a href="${q.url}">${q.title}</a></li>`;
    });

    html += '</ul>';
    container.innerHTML = html;
  });
});
</script>
{% endblock %}
